<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8ab4f8"/>
      <stop offset="100%" stop-color="#669df6"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#669df6"/>
      <stop offset="100%" stop-color="#aecbfa"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle radial highlight -->
  <circle cx="512" cy="460" r="380" fill="rgba(138,180,248,0.03)"/>

  <!-- Neural network / cortex design -->
  <!-- Central hexagonal node -->
  <g filter="url(#softglow)">
    <!-- Core brain node -->
    <circle cx="512" cy="480" r="88" fill="none" stroke="url(#glow)" stroke-width="6"/>
    <circle cx="512" cy="480" r="44" fill="url(#glow)" opacity="0.9"/>

    <!-- Orbiting nodes -->
    <circle cx="330" cy="340" r="32" fill="url(#glow2)" opacity="0.85"/>
    <circle cx="694" cy="340" r="32" fill="url(#glow)" opacity="0.85"/>
    <circle cx="270" cy="540" r="28" fill="url(#glow)" opacity="0.7"/>
    <circle cx="754" cy="540" r="28" fill="url(#glow2)" opacity="0.7"/>
    <circle cx="370" cy="700" r="26" fill="url(#glow2)" opacity="0.65"/>
    <circle cx="654" cy="700" r="26" fill="url(#glow)" opacity="0.65"/>

    <!-- Neural connections -->
    <line x1="512" y1="480" x2="330" y2="340" stroke="url(#glow)" stroke-width="3" opacity="0.5"/>
    <line x1="512" y1="480" x2="694" y2="340" stroke="url(#glow2)" stroke-width="3" opacity="0.5"/>
    <line x1="512" y1="480" x2="270" y2="540" stroke="url(#glow)" stroke-width="3" opacity="0.4"/>
    <line x1="512" y1="480" x2="754" y2="540" stroke="url(#glow2)" stroke-width="3" opacity="0.4"/>
    <line x1="512" y1="480" x2="370" y2="700" stroke="url(#glow2)" stroke-width="3" opacity="0.35"/>
    <line x1="512" y1="480" x2="654" y2="700" stroke="url(#glow)" stroke-width="3" opacity="0.35"/>

    <!-- Cross connections -->
    <line x1="330" y1="340" x2="270" y2="540" stroke="url(#glow2)" stroke-width="2" opacity="0.25"/>
    <line x1="694" y1="340" x2="754" y2="540" stroke="url(#glow)" stroke-width="2" opacity="0.25"/>
    <line x1="270" y1="540" x2="370" y2="700" stroke="url(#glow)" stroke-width="2" opacity="0.2"/>
    <line x1="754" y1="540" x2="654" y2="700" stroke="url(#glow2)" stroke-width="2" opacity="0.2"/>
    <line x1="330" y1="340" x2="694" y2="340" stroke="url(#glow)" stroke-width="2" opacity="0.2"/>
    <line x1="370" y1="700" x2="654" y2="700" stroke="url(#glow2)" stroke-width="2" opacity="0.2"/>

    <!-- Outer ring arc -->
    <path d="M 320 260 A 280 280 0 0 1 704 260" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
    <path d="M 250 620 A 300 300 0 0 0 370 750" fill="none" stroke="url(#glow2)" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
    <path d="M 774 620 A 300 300 0 0 1 654 750" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
  </g>

  <!-- "C" letterform subtly integrated -->
  <text x="512" y="870" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="100" fill="url(#glow)" opacity="0.6" letter-spacing="16">CORTEX</text>
</svg>
